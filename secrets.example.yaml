# Copy this file to secrets.yaml (which is gitignored) and fill in your own
# values. ESPHome reads ./secrets.yaml automatically when you run
# `esphome run trigger4p_esphome.yaml`, and the HA ESPHome add-on reads
# /config/secrets.yaml. trigger4p_esphome.yaml pulls everything below via
# !secret, so you should never have to edit the YAML itself for a new unit.

# ----- WiFi -----------------------------------------------------------------
wifi_ssid:     "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# Fallback AP that ESPHome serves if it can't reach your WiFi. Connect a
# phone to "trigger4p fallback" to reconfigure.
wifi_ap_password: "CHANGE_ME"

# ----- ESPHome internals ----------------------------------------------------
# Generate with: openssl rand -base64 32
api_encryption_key: "REPLACE_WITH_32_BYTE_BASE64"

# Used for OTA updates after first flash. Pick any strong password.
ota_password: "REPLACE_WITH_OTA_PASSWORD"

# ----- TRIGGER ACS Plus -----------------------------------------------------
# MAC address of the BLE relay controller (uppercase, colon-separated).
# Discover it with the official TRIGGER app, a generic BLE scanner app, or
# `python3 test_trigger_from_mac.py sw1_on` (it scans by name first).
trigger_mac: "AA:BB:CC:DD:EE:FF"

# Device-ID byte the unit ships with. Visible in captured 8-byte command
# frames as byte index 2. If you don't know it yet, set it to 0x44 and
# confirm with a sniffer or by trying a single SW1 ON write.
trigger_device_id: "0x44"

# Pairing PIN as a single decimal integer — exactly the value you set in
# the TRIGGER app's settings ("Password"). The ESPHome lambdas split it
# into the two payload bytes at runtime, so you do not compute hex by hand.
# Example: a PIN of 1234 becomes payload bytes 0x04 0xD2 automatically.
trigger_password: "1234"
