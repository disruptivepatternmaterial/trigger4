# ESPHome config for an ESP32-C6 (M5Stack NanoC6) BLE bridge to a
# TRIGGER ACS Plus 4-relay controller.
#
# Entities exposed to Home Assistant:
#   switch.passenger_light       (SW1 on/off)
#   switch.driver_light          (SW2 on/off)
#   switch.passenger_blink       (SW1 blink mode)
#   switch.driver_blink          (SW2 blink mode)
#   switch.both_lights           (master — derived state, cascades to children)
#   switch.both_blink            (master — derived state, cascades to children)
#   number.dim_level             (0..255 — global dim, opcode 0x2D)
#   light.trigger_status_led     (onboard NanoC6 RGB LED — BLE link status)
#   binary_sensor.trigger_test_button  (onboard GPIO9 button)
#
# Protocol verified against real hardware (see README.md > BLE protocol):
#   Service       : 0xFFF0
#   Write char    : 0xFFF6  (Write Without Response only — 0x52)
#   Action frame  : 74 88 <id> 21 <action> DE <pwd_hi> <pwd_lo>   (8 bytes)
#   Dim frame     : 74 88 <id> 2D <inv>    00 <pwd_hi> <pwd_lo>   (8 bytes)
#                   inv = 0xFF - slider  (matches official app: low wire byte
#                   = bright, high wire byte = dim).  Despite the APK exposing
#                   per-channel dim opcodes 0x2B/2C/2D/2E in the 4-PLUS source,
#                   on-the-wire testing showed only 0x2D produces a visible
#                   change on this firmware — dim is a single shared register.
#                   Side effect: dimming with one channel ON works cleanly,
#                   but dimming with both channels ON makes the un-targeted
#                   channel flicker as the shared PWM duty changes.  Known
#                   box quirk; nothing the firmware can fix.
#   Keepalive     : 74 88 <id> 00 00 DE <pwd_hi> <pwd_lo>         (8 bytes,
#                   every 200 ms — REQUIRED to keep the session alive)
#   Action codes  (verified against official APK fourbottonctl):
#     ch1            : EA on, EB off, EC blink, ED steady
#     ch2 (passenger): EE on, EF off, F0 blink, F1 steady
#     ch3 (driver)   : F2 on, F3 off, F4 blink, F5 steady
#     ch4            : F6 on, F7 off, F8 blink, F9 steady
#
# Design notes:
#   - Mirrors test_trigger_from_mac.py exactly: write 8 bytes, 300 ms gap,
#     write 8 bytes, with 200 ms keepalives running concurrently.
#   - send_action is `mode: queued` so calls serialize naturally; no busy
#     flag, no LED-in-the-write-path, no FFF7 sensor.
#   - Master switches derive state from children via lambda; turn_on/turn_off
#     cascade through the children with INTER_ACTION_MS spacing.
#   - Status LED reflects BLE link state only (red = down, green = up).

substitutions:
  trigger_name:      "trigger4p"
  # MAC, device_id, and password come from secrets.yaml so this YAML can
  # be shared publicly. trigger_password is a decimal int (the PIN you
  # set in the official TRIGGER app); the lambdas split it into the two
  # payload bytes at runtime.
  trigger_device_id: !secret trigger_device_id
  passenger_name:    "Passenger Light"
  driver_name:       "Driver Light"
  both_name:         "Both Lights"
  inter_action_ms:   "300ms"  # matches bleak tester's INTER_S = 0.30

esphome:
  name: ${trigger_name}
  friendly_name: TRIGGER ACS Plus (BLE)
  on_boot:
    # Show orange the moment LEDs are usable so we know the firmware is alive.
    - priority: -10
      then:
        - light.turn_on:
            id: trigger_status_led
            red: 100%
            green: 35%
            blue: 0%
            brightness: 25%
            transition_length: 0s
    # If wifi hasn't associated within 60 s, disable it so it stops scanning
    # and starving the shared 2.4 GHz radio that BLE needs. Power-cycle to
    # retry wifi.
    - priority: -100
      then:
        - delay: 60s
        - if:
            condition:
              not:
                wifi.connected:
            then:
              - logger.log: "WiFi did not associate within 60s — disabling to free 2.4 GHz for BLE"
              - wifi.disable:

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${trigger_name} fallback"
    password: !secret wifi_ap_password

captive_portal:

web_server:
  port: 80

esp32_ble_tracker:

ble_client:
  - mac_address: !secret trigger_mac
    id: trigger_client
    on_connect:
      - logger.log: "TRIGGER connected"
      - light.turn_on:
          id: trigger_status_led
          red: 0%
          green: 100%
          blue: 0%
          brightness: 25%
      - globals.set:
          id: trigger_link_up
          value: "true"
    on_disconnect:
      - logger.log: "TRIGGER disconnected"
      - light.turn_on:
          id: trigger_status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 25%
      - globals.set:
          id: trigger_link_up
          value: "false"

# Subscribe to FFF7 notifications.  The box's state stream MUST be drained
# (the official phone app reads it every ~250ms); without this the box
# throttles writes and dimming with both channels on causes the un-targeted
# channel to flicker.  No state parsing — we only need the subscription.
sensor:
  - platform: ble_client
    type: characteristic
    ble_client_id: trigger_client
    name: "TRIGGER Notify"
    service_uuid: "FFF0"
    characteristic_uuid: "FFF7"
    notify: true
    internal: true
    lambda: 'return x.empty() ? NAN : (float) x[0];'

globals:
  - id: trigger_link_up
    type: bool
    restore_value: no
    initial_value: 'false'
  # Pairing PIN as a single decimal int. Frame lambdas split this into
  # pwd_hi = (pin >> 8) & 0xFF and pwd_lo = pin & 0xFF so users never
  # have to compute hex bytes by hand.
  - id: trigger_password
    type: int
    restore_value: no
    initial_value: !secret trigger_password

# ---------------------------------------------------------------------------
# Scripts — minimal. Each writes exactly 8 or 9 bytes to FFF6 and returns.
# No state machines, no busy flags, no LED side-effects.
# ---------------------------------------------------------------------------
script:
  - id: send_action
    mode: queued       # serialize multiple back-to-back action calls
    max_runs: 16
    parameters:
      action: int
    then:
      - if:
          condition:
            lambda: 'return id(trigger_link_up);'
          then:
            - ble_client.ble_write:
                id: trigger_client
                service_uuid: "FFF0"
                characteristic_uuid: "FFF6"
                value: !lambda |-
                  return std::vector<uint8_t>{
                    0x74, 0x88,
                    (uint8_t) ${trigger_device_id},
                    0x21,
                    (uint8_t) action,
                    0xDE,
                    (uint8_t) ((id(trigger_password) >> 8) & 0xFF),
                    (uint8_t)  (id(trigger_password)       & 0xFF)
                  };

  # Single global dim register. wire byte is inverted (0xFF - slider) so the
  # slider feels right in HA: 255 = brightest, 0 = off.
  - id: send_dim
    mode: queued
    max_runs: 16
    parameters:
      level: int
    then:
      - if:
          condition:
            lambda: 'return id(trigger_link_up);'
          then:
            - ble_client.ble_write:
                id: trigger_client
                service_uuid: "FFF0"
                characteristic_uuid: "FFF6"
                value: !lambda |-
                  return std::vector<uint8_t>{
                    0x74, 0x88,
                    (uint8_t) ${trigger_device_id},
                    0x2D,
                    (uint8_t) (0xFF - (level & 0xFF)),
                    0x00,
                    (uint8_t) ((id(trigger_password) >> 8) & 0xFF),
                    (uint8_t)  (id(trigger_password)       & 0xFF)
                  };

interval:
  - interval: 200ms
    then:
      - if:
          condition:
            lambda: 'return id(trigger_link_up);'
          then:
            - ble_client.ble_write:
                id: trigger_client
                service_uuid: "FFF0"
                characteristic_uuid: "FFF6"
                value: !lambda |-
                  // 8-byte keepalive — matches official phone app exactly.
                  // (Earlier 9-byte version desynced the box parser and made
                  // dim packets land on adjacent channels' strobe action byte.)
                  return std::vector<uint8_t>{
                    0x74, 0x88,
                    (uint8_t) ${trigger_device_id},
                    0x00, 0x00,
                    0xDE,
                    (uint8_t) ((id(trigger_password) >> 8) & 0xFF),
                    (uint8_t)  (id(trigger_password)       & 0xFF)
                  };

# ---------------------------------------------------------------------------
# Switches.
#   Children (passenger_light, driver_light, *_blink) own the action codes
#   and their own optimistic state.
#   Masters (both_*) derive state from children via lambda and cascade
#   turn_on/turn_off through them with INTER_ACTION_MS spacing.
# ---------------------------------------------------------------------------
switch:
  # M5Stack NanoC6 onboard RGB LED power-enable on GPIO19.
  - platform: gpio
    pin: GPIO19
    id: nanoc6_led_power
    name: "NanoC6 LED Power"
    restore_mode: ALWAYS_ON
    internal: true

  - platform: template
    name: "${passenger_name}"
    id: passenger_light
    optimistic: true
    turn_on_action:
      - script.execute: { id: send_action, action: 0xEE }
    turn_off_action:
      - script.execute: { id: send_action, action: 0xEF }

  - platform: template
    name: "${driver_name}"
    id: driver_light
    optimistic: true
    turn_on_action:
      - script.execute: { id: send_action, action: 0xF2 }
    turn_off_action:
      - script.execute: { id: send_action, action: 0xF3 }

  - platform: template
    name: "${passenger_name} Blink"
    id: passenger_blink
    optimistic: true
    turn_on_action:
      - script.execute: { id: send_action, action: 0xF0 }
    turn_off_action:
      - script.execute: { id: send_action, action: 0xF1 }

  - platform: template
    name: "${driver_name} Blink"
    id: driver_blink
    optimistic: true
    turn_on_action:
      - script.execute: { id: send_action, action: 0xF4 }
    turn_off_action:
      - script.execute: { id: send_action, action: 0xF5 }

  - platform: template
    name: "${both_name}"
    id: both_lights
    lambda: 'return id(passenger_light).state && id(driver_light).state;'
    turn_on_action:
      - switch.turn_on: passenger_light
      - delay: ${inter_action_ms}
      - switch.turn_on: driver_light
    turn_off_action:
      - switch.turn_off: passenger_light
      - delay: ${inter_action_ms}
      - switch.turn_off: driver_light

  - platform: template
    name: "${both_name} Blink"
    id: both_blink
    lambda: 'return id(passenger_blink).state && id(driver_blink).state;'
    turn_on_action:
      - switch.turn_on: passenger_blink
      - delay: ${inter_action_ms}
      - switch.turn_on: driver_blink
    turn_off_action:
      - switch.turn_off: passenger_blink
      - delay: ${inter_action_ms}
      - switch.turn_off: driver_blink

# Single global dim slider. Per-channel opcodes 0x2B/2C/2E exist in the
# official APK source but on real hardware only 0x2D produces a visible
# change — the box has one shared dim register.
number:
  - platform: template
    name: "Dim Level"
    id: dim_level
    optimistic: true
    min_value: 51
    max_value: 255
    step: 51
    initial_value: 255
    mode: slider
    on_value:
      - script.execute:
          id: send_dim
          level: !lambda 'return (int) x;'

light:
  - platform: esp32_rmt_led_strip
    name: "TRIGGER Status LED"
    id: trigger_status_led
    pin: GPIO20
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 100ms

# Onboard GPIO9 button:
#   single click  → toggle both_lights on/off (resets dim to full on power-on)
#   double click  → toggle both_blink
#   hold (≥1 s)   → cycle dim level 51 → 102 → 153 → 204 → 255 → 51
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: { input: true, pullup: true }
      inverted: true
    name: "TRIGGER Test Button"
    id: trigger_test_button
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 250ms
        then:
          - switch.toggle: both_blink
      - timing:
          - ON for 50ms to 800ms
          - OFF for at least 250ms
        then:
          - if:
              condition:
                switch.is_on: both_lights
              then:
                - switch.turn_off: both_lights
              else:
                - number.set: { id: dim_level, value: 255 }
                - switch.turn_on: both_lights
      - timing:
          - ON for at least 1000ms
        then:
          - lambda: |-
              int cur = (int) id(dim_level).state;
              int next = cur + 51;
              if (next > 255) next = 51;
              auto call = id(dim_level).make_call();
              call.set_value(next);
              call.perform();
